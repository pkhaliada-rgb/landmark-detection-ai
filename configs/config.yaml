# ============================================================
# Landmark Detection — Central Configuration
# Edit these values to match your dataset and training setup.
# ============================================================

dataset:
  # Kaggle dataset slug used by scripts/download_dataset.py
  # Default is a general-purpose world-landmarks classification dataset.
  # Swap this for any Kaggle dataset organized as one folder per class.
  kaggle_slug: "kayvanshah/landmarks-dataset"

  # Where the raw download is unzipped to
  raw_dir: "data/raw"

  # Where the train/val/test split (ImageFolder format) is written
  processed_dir: "data/processed"

  # Split ratios (must sum to 1.0)
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

  # Minimum images required per class to keep it (drops sparse/noisy classes)
  min_images_per_class: 20

model:
  architecture: "resnet50"     # resnet50 | efficientnet_b0
  pretrained: true
  image_size: 224

train:
  batch_size: 32
  epochs: 15
  learning_rate: 0.0003
  weight_decay: 0.0001
  num_workers: 4
  early_stopping_patience: 4
  checkpoint_dir: "outputs/checkpoints"

gradcam:
  target_layer: "layer4"
  heatmap_threshold: 0.5

inference:
  confidence_threshold: 0.3
  output_dir: "outputs/predictions"
